name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/deploy-infra.yml'
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-photosmarket-dev
  AZURE_REGION: eastus

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Resource Group (if not exists)
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location ${{ env.AZURE_REGION }}

      - name: Deploy Bicep infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --template-file ./infra/main.bicep \
            --parameters ./infra/main.bicepparam \
            --parameters googleOAuthClientId=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }} \
            --parameters googleOAuthClientSecret=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }} \
            --parameters jwtSecretKey=${{ secrets.JWT_SECRET_KEY }} \
            --parameters googleDriveRootFolderId=${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_ID }}

      - name: Show deployment outputs
        run: |
          az deployment group show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name main \
            --query properties.outputs

      - name: Logout from Azure
        if: always()
        run: az logout
