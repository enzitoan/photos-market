name: Deploy PhotosMarket to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'infra/**'
      - '.github/workflows/deploy-to-azure.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - both
          - frontend-only
          - backend-only
        default: both

env:
  AZURE_RESOURCE_GROUP: rg-photosmarket-dev
  AZURE_CONTAINER_REGISTRY: photosmarketacrdev
  BACKEND_IMAGE_NAME: photosmarket-backend
  FRONTEND_IMAGE_NAME: photosmarket-frontend
  BACKEND_CONTAINER_APP: photosmarket-backend-dev
  FRONTEND_CONTAINER_APP: photosmarket-frontend-dev
  AZURE_REGION: eastus

jobs:
  # Job 0: Run Tests (blocks deployment if tests fail)
  run-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend Tests
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Backend dependencies
        working-directory: ./src/backend
        run: dotnet restore PhotosMarket.API.csproj

      - name: Build Backend
        working-directory: ./src/backend
        run: dotnet build PhotosMarket.API.csproj --no-restore --configuration Release

      - name: Run Backend Tests
        working-directory: ./src/backend
        run: |
          echo "🧪 Running Backend Unit Tests..."
          dotnet test PhotosMarket.API.Tests/PhotosMarket.API.Tests.csproj \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "console;verbosity=detailed"
          
          if [ $? -ne 0 ]; then
            echo "❌ Backend tests failed! Deployment cancelled."
            exit 1
          fi
          echo "✅ Backend tests passed!"

      # Frontend Tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./src/frontend/package-lock.json

      - name: Install Frontend dependencies
        working-directory: ./src/frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: ./src/frontend
        run: |
          echo "🧪 Running Frontend Unit Tests..."
          npm test
          
          if [ $? -ne 0 ]; then
            echo "❌ Frontend tests failed! Deployment cancelled."
            exit 1
          fi
          echo "✅ Frontend tests passed!"

      - name: All Tests Passed
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║      ✅ All Tests Passed! Proceeding with deployment...   ║"
          echo "╚════════════════════════════════════════════════════════════╝"

  # Job 1: Deploy Frontend First
  deploy-frontend:
    needs: [run-tests]
    name: Deploy Frontend
    runs-on: ubuntu-latest
    # Only run if deploying both or frontend-only
    if: |
      github.event_name == 'push' || 
      github.event.inputs.deploy_target == 'both' || 
      github.event.inputs.deploy_target == 'frontend-only'
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    outputs:
      frontend-fqdn: ${{ steps.get-fqdn.outputs.fqdn }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Fetch last 2 commits for change detection

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Check if frontend code changed
        id: check-frontend
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^src/frontend/' || echo "")
            if [ -n "$CHANGED" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Frontend files changed, will rebuild"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No frontend changes detected"
            fi
          fi

      - name: Build and push Frontend Docker image
        if: steps.check-frontend.outputs.changed == 'true'
        working-directory: ./src/frontend
        run: |
          IMAGE_TAG=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:latest
          
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "✅ Frontend image built and pushed"

      - name: Get Backend FQDN for Frontend
        id: get-backend-fqdn
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv 2>/dev/null || echo "")
          
          if [ -z "$BACKEND_FQDN" ]; then
            echo "⚠️  Backend not found, using placeholder"
            echo "fqdn=photosmarket-backend-dev.placeholder.azurecontainerapps.io" >> $GITHUB_OUTPUT
          else
            echo "✅ Backend FQDN: $BACKEND_FQDN"
            echo "fqdn=$BACKEND_FQDN" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Frontend Container App
        if: steps.check-frontend.outputs.changed == 'true'
        run: |
          BACKEND_URL=${{ steps.get-backend-fqdn.outputs.fqdn }}
          
          az containerapp update \
            --name ${{ env.FRONTEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars "VITE_API_URL=https://${BACKEND_URL}" \
            --output none
          
          echo "✅ Frontend deployed with Backend URL: https://${BACKEND_URL}"

      - name: Get Frontend FQDN (for Backend)
        id: get-fqdn
        run: |
          FRONTEND_FQDN=$(az containerapp show \
            --name ${{ env.FRONTEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          echo "✅ Frontend FQDN: $FRONTEND_FQDN"
          echo "fqdn=$FRONTEND_FQDN" >> $GITHUB_OUTPUT

      - name: Display Frontend URL
        run: |
          echo "🌐 Frontend URL: https://${{ steps.get-fqdn.outputs.fqdn }}"

      - name: Logout from Azure
        if: always()
        run: az logout

  # Job 2: Deploy Backend (depends on Frontend and Tests)
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [run-tests, deploy-frontend]
    # Only run if tests passed and deploying both or backend-only
    if: |
      always() && 
      needs.run-tests.result == 'success' &&
      (needs.deploy-frontend.result == 'success' || needs.deploy-frontend.result == 'skipped') &&
      (github.event_name == 'push' || 
       github.event.inputs.deploy_target == 'both' || 
       github.event.inputs.deploy_target == 'backend-only')
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Fetch last 2 commits for change detection

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ env.AZURE_CONTAINER_REGISTRY }}

      - name: Check if backend code changed
        id: check-backend
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^src/backend/' || echo "")
            if [ -n "$CHANGED" ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "Backend files changed, will rebuild"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "No backend changes detected"
            fi
          fi

      - name: Build and push Backend Docker image
        if: steps.check-backend.outputs.changed == 'true'
        working-directory: ./src/backend
        run: |
          IMAGE_TAG=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:latest
          
          docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST
          
          echo "✅ Backend image built and pushed"

      - name: Get Frontend FQDN (Real)
        id: get-frontend-fqdn
        run: |
          # Try to get from previous job output first
          FRONTEND_FQDN="${{ needs.deploy-frontend.outputs.frontend-fqdn }}"
          
          # If empty, query Azure directly
          if [ -z "$FRONTEND_FQDN" ]; then
            FRONTEND_FQDN=$(az containerapp show \
              --name ${{ env.FRONTEND_CONTAINER_APP }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.configuration.ingress.fqdn" -o tsv)
          fi
          
          echo "✅ Frontend FQDN (for OAuth redirect): $FRONTEND_FQDN"
          echo "fqdn=$FRONTEND_FQDN" >> $GITHUB_OUTPUT

      - name: Deploy Backend Container App
        if: steps.check-backend.outputs.changed == 'true'
        run: |
          FRONTEND_URL=https://${{ steps.get-frontend-fqdn.outputs.fqdn }}
          
          az containerapp update \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} \
            --set-env-vars "FRONTEND_URL=${FRONTEND_URL}" \
            --output none
          
          echo "✅ Backend deployed with Frontend URL: ${FRONTEND_URL}"

      - name: Verify OAuth Configuration
        run: |
          echo "🔍 Verifying OAuth configuration..."
          
          # Check FRONTEND_URL
          FRONTEND_URL=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?name=='FRONTEND_URL'].value" -o tsv)
          
          echo "📋 FRONTEND_URL: $FRONTEND_URL"
          
          # Check OAuth Scopes
          SCOPES=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?contains(name, 'GoogleOAuth__Scopes')].{name:name, value:value}" -o json)
          
          SCOPE_COUNT=$(echo "$SCOPES" | jq '. | length')
          
          echo "📋 OAuth Scopes configured: $SCOPE_COUNT"
          echo "$SCOPES" | jq -r '.[] | "   - \(.name): \(.value)"'
          
          # Validate
          if [ -z "$FRONTEND_URL" ]; then
            echo "❌ ERROR: FRONTEND_URL is not configured!"
            exit 1
          fi
          
          if [ "$SCOPE_COUNT" -lt 3 ]; then
            echo "⚠️  WARNING: Only $SCOPE_COUNT scopes configured (expected 3)"
            echo "   This may cause OAuth errors. Run the Fix-AzureOAuthConfig.ps1 script."
          else
            echo "✅ OAuth configuration looks good!"
          fi

      - name: Update Frontend with final Backend URL
        if: steps.check-backend.outputs.changed == 'true'
        run: |
          # Get the real Backend FQDN after deployment
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          # Update Frontend with the real Backend URL
          az containerapp update \
            --name ${{ env.FRONTEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --set-env-vars "VITE_API_URL=https://${BACKEND_FQDN}" \
            --output none
          
          echo "✅ Frontend updated with final Backend URL: https://${BACKEND_FQDN}"

      - name: Display Deployment Summary
        run: |
          FRONTEND_FQDN=${{ steps.get-frontend-fqdn.outputs.fqdn }}
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ env.BACKEND_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          
          echo ""
          echo "╔═══════════════════════════════════════════════════════════╗"
          echo "║           DEPLOYMENT COMPLETED SUCCESSFULLY               ║"
          echo "╚═══════════════════════════════════════════════════════════╝"
          echo ""
          echo "🌐 Application URLs:"
          echo "   Frontend: https://${FRONTEND_FQDN}"
          echo "   Backend:  https://${BACKEND_FQDN}"
          echo ""
          echo "🔐 OAuth Configuration:"
          echo "   FRONTEND_URL: https://${FRONTEND_FQDN}"
          echo "   Redirect URI: https://${FRONTEND_FQDN}/callback"
          echo ""
          echo "⚠️  IMPORTANT: Verify Google Cloud Console has this redirect URI:"
          echo "   https://${FRONTEND_FQDN}/callback"
          echo ""
          echo "📖 For troubleshooting: docs/TROUBLESHOOTING-OAUTH.md"
          echo ""

      - name: Logout from Azure
        if: always()
        run: az logout
